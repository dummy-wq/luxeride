services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luxeride-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/luxeride?authSource=admin
      - MONGODB_DB=luxeride
      - JWT_SECRET=luxeride-jwt-secret-key-dev-2026
      - NODE_ENV=production
    depends_on:
      - mongodb

  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: luxeride-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=luxeride
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
